version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: tpcds-postgres
    environment:
      POSTGRES_USER: tpcds
      POSTGRES_PASSWORD: tpcds
      POSTGRES_DB: tpcds
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: tpcds-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  trino:
    image: trinodb/trino:455
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog

volumes:
  pgdata:
  mongo_data:
